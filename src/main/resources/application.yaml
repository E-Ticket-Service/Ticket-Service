spring:
  application:
    name: ticket-service
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5433}/${DB_NAME:app-db}?currentSchema=${DB_SCHEMA:ticket_db}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver

  jpa:
    properties:
      hibernate:
        default_schema: ${DB_SCHEMA:ticket_db}
    hibernate:
      ddl-auto: update

  web:
    error:
      include-message: always
      include-binding-errors: always

  kafka:
    bootstrap-servers: ${KAFKA_HOST:localhost}:${KAFKA_PORT:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      properties:
        max.request.size: 5242880 # 5MB limit for large PDF data
    properties:
      spring.json.type.mapping: ticketCreatedEvent:abb.tech.ticket_service.dto.event.TicketCreatedEvent

server:
  port: 8082
